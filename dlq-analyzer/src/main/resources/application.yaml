spring:
  jackson:
    time-zone: ${TZ:Asia/Kolkata}
  application:
    name: ${APP_NAME:dlq-analyzer}

  # Database
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dlqanalyzer}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:dlq-analyzer}
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# DLQ Config
dlq:
  polling:
    interval-ms: ${DLQ_POLLING_INTERVAL_MS:30000}
  rabbitmq:
    dlq-patterns: ${DLQ_PATTERNS:.dlq,-dlq,.dead-letter}
    dlq-names: ${DLQ_NAMES:}
    management-url: ${RABBITMQ_MGMT_URL:http://localhost:15672}
  kafka:
    dlt-suffix: ${DLQ_KAFKA_SUFFIX:.DLT}
  replay:
    default-rate-per-minute: ${DLQ_REPLAY_RATE_PER_MINUTE:100}

server:
  port: ${APP_PORT:8081}

security:
  admin:
    username: ${DLQ_ADMIN_USER:admin}
    password: ${DLQ_ADMIN_PASSWORD:admin}
  viewer:
    username: ${DLQ_VIEWER_USER:viewer}
    password: ${DLQ_VIEWER_PASSWORD:viewer}