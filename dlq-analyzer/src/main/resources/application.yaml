spring:
  jackson:
    time-zone: Asia/Kolkata
  application:
    name: dlp-analyzer

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/dlqanalyzer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: dlq-analyzer
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

# DLQ Config (Perfect!)
dlq:
  polling:
    interval-ms: 30000
  rabbitmq:
    dlq-patterns: .dlq,-dlq,.dead-letter
  kafka:
    dlt-suffix: .DLT
  replay:
    default-rate-per-minute: 100

server:
  port: 8081